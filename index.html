<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>公會排班表</title>
  <style>
    :root{--bg:#0f172a;--panel:#111827;--paper:#f8fafc;--grid:#d7deea;--text:#111827;--muted:#667085;--title:#312e81;--date:#4338ca;--day:#e0e7ff;--side:#f1f5f9;--note:#fce7f3;--job:#dbeafe;--blue:#4f46e5;--green:#059669}
    *{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top,#24315f 0,var(--bg) 520px);color:#e5e7eb;font-family:system-ui,"Noto Sans TC",sans-serif}main{width:min(1480px,calc(100% - 16px));margin:8px auto 32px}
    .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:12px}.team-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
    button,input{font:inherit;border:1px solid #cbd5e1;border-radius:10px;padding:8px 10px;background:white}button{cursor:pointer;font-weight:700}.primary{background:var(--blue);color:white;border-color:var(--blue)}.good{background:var(--green);color:white;border-color:var(--green)}.danger{color:#b42318}.team-tabs button.active{background:#c7d2fe;color:#1e1b4b;border-color:#c7d2fe}
    .status{color:#86efac;min-height:22px;margin-left:auto}.status.error{color:#fca5a5}.sheet-wrap{overflow:hidden;border:1px solid #334155;background:var(--paper);box-shadow:0 24px 70px #0004;border-radius:18px}
    table{border-collapse:separate;border-spacing:0;width:100%;table-layout:fixed;color:var(--text)}th,td{border-right:1px solid var(--grid);border-bottom:1px solid var(--grid);height:32px;text-align:center;vertical-align:middle;padding:0}
    input.cell{width:100%;height:100%;border:0;border-radius:0;background:transparent;text-align:center;font-weight:700;padding:3px 4px;font-size:clamp(11px,1.15vw,16px)}input.cell:focus{outline:2px solid #2563eb;outline-offset:-2px;background:#eef4ff}
    .team-title{background:linear-gradient(135deg,#eef2ff,#ddd6fe);color:var(--title);font-size:clamp(13px,1.5vw,20px);font-weight:900}.date-title{background:linear-gradient(135deg,#4f46e5,#7c3aed);color:white;font-size:clamp(18px,2.2vw,26px);font-weight:900}.head-name{background:#c7d2fe;font-size:clamp(13px,1.55vw,21px);font-weight:900;color:#1e1b4b}.head-day{background:var(--day);font-size:clamp(12px,1.45vw,20px);font-weight:800;color:#1e3a8a}.head-note{background:var(--note);font-size:clamp(12px,1.35vw,19px);font-weight:800;color:#831843}.head-job{background:var(--job);font-size:clamp(12px,1.35vw,19px);font-weight:800;color:#1e3a8a}.name-cell{background:var(--side)}.name-cell input{font-size:clamp(12px,1.25vw,18px);color:#111827}.time-cell{cursor:pointer;font-weight:800;background:#fff;font-size:clamp(11px,1.1vw,16px);word-break:break-word;line-height:1.15}.time-cell:hover{background:#eef4ff}.member-actions{display:flex;justify-content:center;gap:3px;padding:2px}.member-actions button{padding:2px 5px;font-size:clamp(10px,.9vw,12px)}.empty-row td{height:22px;background:#f8fafc}
    .modal{position:fixed;inset:0;display:none;place-items:center;background:#0006;padding:18px}.modal.open{display:grid}.dialog{width:min(420px,100%);background:white;border-radius:16px;padding:18px;box-shadow:0 24px 80px #0005}.dialog h2{margin:0 0 12px}.dialog .row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 0}.dialog label{display:grid;gap:5px;color:var(--muted);font-size:14px}.quick{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}.right{display:flex;justify-content:flex-end;gap:8px}
  </style>
</head>
<body>
<main>
  <div class="toolbar">
    <button id="addTeam" class="primary">新增團</button>
    <button id="addMember" class="good">新增成員</button>
    <button id="save" class="primary">儲存</button>
    <button id="reload">重新載入</button>
    <button id="deleteTeam" class="danger">刪除此團</button>
    <span id="status" class="status"></span>
  </div>
  <div id="teamTabs" class="team-tabs"></div>
  <div class="sheet-wrap"><table id="sheet"></table></div>
</main>

<div id="timeModal" class="modal">
  <div class="dialog">
    <h2>設定時間</h2>
    <label>顯示文字<input id="timeText" placeholder="例如：19:00後、10:00-24:00、整天"></label>
    <div class="row">
      <label>開始時間<input id="startTime" type="time"></label>
      <label>結束時間<input id="endTime" type="time"></label>
    </div>
    <div class="quick">
      <button data-quick="整天">整天</button>
      <button data-quick="19:00後">晚上7點後</button>
      <button data-quick="21:00後">21:00後</button>
      <button data-quick="">清空</button>
    </div>
    <div class="right"><button id="cancelTime">取消</button><button id="applyTime" class="primary">套用</button></div>
  </div>
</div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbw_CwG4rz3W1XpWSMmWaEJtpIhtxxHEqTtOWwGbzIN4Btl6eh9MVW8bhIVSY3TR9ME/exec";
const $=id=>document.getElementById(id);
const DEFAULT_DAYS=["禮拜四","禮拜五","禮拜六","禮拜日","禮拜一","禮拜二","禮拜三"];
let state={teams:[]},activeTeam=0,editingCell=null;
function newId(){return crypto.randomUUID?crypto.randomUUID():String(Date.now())}
function defaultTeam(name="阿罵團"){return{id:newId(),title:name,dateRange:"6/18-6/24",days:[...DEFAULT_DAYS],members:[{name:"阿罵",job:"標",level:"162",note:"",times:["","","","","","",""]},{name:"木木",job:"冰雷",level:"174",note:"",times:["","","10:00-24:00","10:00-24:00","","",""]}]}}
function status(text,bad=false){$("status").textContent=text;$("status").classList.toggle("error",bad)}
async function api(action,data={}){const r=await fetch(API_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify({action,...data})});const out=await r.json();if(!out.ok)throw Error(out.error||"資料處理失敗");return out}
function team(){if(!state.teams.length)state.teams.push(defaultTeam());if(!state.teams[activeTeam])activeTeam=0;return state.teams[activeTeam]}
function renderTabs(){$("teamTabs").innerHTML=state.teams.map((t,i)=>`<button class="${i===activeTeam?"active":""}" data-team="${i}">${esc(t.title||"未命名團")}</button>`).join("");document.querySelectorAll("[data-team]").forEach(b=>b.onclick=()=>{activeTeam=Number(b.dataset.team);render()})}
function render(){const t=team();renderTabs();$("sheet").innerHTML=`<colgroup><col style="width:10%"><col style="width:7%"><col style="width:5.5%">${t.days.map(()=>"<col style='width:9.2%'>").join("")}<col style="width:12%"><col style="width:5%"></colgroup><tr><th class="team-title" colspan="3"><input class="cell" data-field="title" value="${attr(t.title)}"></th><th class="date-title" colspan="${t.days.length}"><input class="cell" data-field="dateRange" value="${attr(t.dateRange)}"></th><th colspan="2"></th></tr><tr><th class="head-name">名稱</th><th class="head-job">職業</th><th class="head-job">等級</th>${t.days.map((d,i)=>`<th class="head-day"><input class="cell" data-day="${i}" value="${attr(d)}"></th>`).join("")}<th class="head-note">★備註</th><th class="head-job">操作</th></tr>${t.members.map((m,r)=>`<tr><td class="name-cell"><input class="cell" data-row="${r}" data-key="name" value="${attr(m.name)}"></td><td><input class="cell" data-row="${r}" data-key="job" value="${attr(m.job||"")}"></td><td><input class="cell" data-row="${r}" data-key="level" value="${attr(m.level||"")}"></td>${t.days.map((_,c)=>`<td class="time-cell" data-row="${r}" data-col="${c}">${esc((m.times||[])[c]||"")}</td>`).join("")}<td><input class="cell" data-row="${r}" data-key="note" value="${attr(m.note||"")}"></td><td><div class="member-actions"><button data-up="${r}">↑</button><button data-down="${r}">↓</button><button class="danger" data-delete="${r}">刪</button></div></td></tr>`).join("")}<tr class="empty-row">${"<td></td>".repeat(t.days.length+5)}</tr>`;bind()}
function bind(){const t=team();document.querySelectorAll("[data-field]").forEach(i=>i.oninput=()=>{t[i.dataset.field]=i.value;renderTabs()});document.querySelectorAll("[data-day]").forEach(i=>i.oninput=()=>t.days[Number(i.dataset.day)]=i.value);document.querySelectorAll("[data-key]").forEach(i=>i.oninput=()=>t.members[Number(i.dataset.row)][i.dataset.key]=i.value);document.querySelectorAll(".time-cell").forEach(c=>c.onclick=()=>openTime(Number(c.dataset.row),Number(c.dataset.col)));document.querySelectorAll("[data-delete]").forEach(b=>b.onclick=()=>{if(confirm("確定刪除此成員？")){t.members.splice(Number(b.dataset.delete),1);render()}});document.querySelectorAll("[data-up]").forEach(b=>b.onclick=()=>move(Number(b.dataset.up),-1));document.querySelectorAll("[data-down]").forEach(b=>b.onclick=()=>move(Number(b.dataset.down),1))}
function move(i,d){const t=team(),n=i+d;if(n<0||n>=t.members.length)return;[t.members[i],t.members[n]]=[t.members[n],t.members[i]];render()}
function addMember(){team().members.push({name:"新成員",job:"",level:"",note:"",times:["","","","","","",""]});render()}
function addTeam(){const name=prompt("新團名稱","新團");if(!name)return;state.teams.push(defaultTeam(name));activeTeam=state.teams.length-1;render()}
function deleteTeam(){if(state.teams.length<=1)return status("至少需要保留一個團。",true);if(confirm("確定刪除此團？")){state.teams.splice(activeTeam,1);activeTeam=Math.max(0,activeTeam-1);render()}}
function openTime(row,col){editingCell={row,col};const value=(team().members[row].times||[])[col]||"";$("timeText").value=value;$("startTime").value="";$("endTime").value="";const m=value.match(/^(\d{2}:\d{2})(?:-(\d{2}:\d{2}))?/);if(m){$("startTime").value=m[1];$("endTime").value=m[2]||""}$("timeModal").classList.add("open")}
function closeTime(){$("timeModal").classList.remove("open");editingCell=null}
function applyTime(){if(!editingCell)return;let text=$("timeText").value.trim();const s=$("startTime").value,e=$("endTime").value;if(!text&&s&&e)text=`${s}-${e}`;if(!text&&s)text=`${s}後`;team().members[editingCell.row].times[editingCell.col]=text;closeTime();render()}
async function load(){status("載入中...");try{const r=await api("loadSchedule");state=r.schedule&&r.schedule.teams?r.schedule:{teams:[defaultTeam()]};activeTeam=0;render();status("已載入。")}catch(e){state={teams:[defaultTeam()]};render();status(e.message,true)}}
async function save(){status("儲存中...");try{await api("saveSchedule",{schedule:state});status("已儲存。")}catch(e){status(e.message,true)}}
function esc(v){return String(v??"").replace(/[&<>"']/g,ch=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[ch]))}
function attr(v){return esc(v)}
$("addMember").onclick=addMember;$("addTeam").onclick=addTeam;$("deleteTeam").onclick=deleteTeam;$("save").onclick=save;$("reload").onclick=load;$("cancelTime").onclick=closeTime;$("applyTime").onclick=applyTime;document.querySelectorAll("[data-quick]").forEach(b=>b.onclick=()=>{$("timeText").value=b.dataset.quick});$("startTime").oninput=()=>{if($("startTime").value&&!$("timeText").value)$("timeText").value=`${$("startTime").value}後`};$("endTime").oninput=()=>{if($("startTime").value&&$("endTime").value)$("timeText").value=`${$("startTime").value}-${$("endTime").value}`};load();
</script>
</body>
</html>
