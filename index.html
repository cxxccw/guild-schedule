<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>公會每週排團</title>
  <style>
    :root{color-scheme:dark;--bg:#10131f;--card:#191e2e;--line:#303950;--text:#f4f6ff;--muted:#aab3ca;--accent:#8b7cff;--good:#65d6b4;--bad:#ff8597}
    *{box-sizing:border-box}body{margin:0;font-family:system-ui,"Noto Sans TC",sans-serif;background:radial-gradient(circle at top,#252348,var(--bg) 42rem);color:var(--text);min-height:100vh}
    main{width:min(1080px,calc(100% - 24px));margin:auto;padding:36px 0 64px}h1{font-size:clamp(30px,6vw,48px);margin:0 0 8px}h2{margin:0 0 15px}p{color:var(--muted);line-height:1.6}
    .tabs,.row{display:flex;gap:10px;flex-wrap:wrap;align-items:end}.tabs{margin:22px 0}.card{background:#191e2ef2;border:1px solid var(--line);border-radius:18px;padding:20px;margin-bottom:18px;box-shadow:0 20px 60px #0004}
    label{display:grid;gap:7px;color:var(--muted);font-size:14px}input,select,button{font:inherit;border:1px solid var(--line);border-radius:10px;padding:11px 13px}input,select{color:var(--text);background:#101522;min-width:190px}
    button{cursor:pointer;color:white;background:var(--accent);border-color:transparent;font-weight:700}.secondary,.tabs button:not(.active){background:#181d2a;border-color:var(--line);color:var(--muted)}button:disabled{opacity:.55}
    .slots{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:9px}.slot{position:relative;border:1px solid var(--line);border-radius:12px;padding:11px;background:#111624;color:var(--muted);cursor:pointer}.slot input{position:absolute;opacity:0}
    .slot:has(input:checked){border-color:var(--good);background:#16362f;color:#fff}.slot strong{display:block;color:var(--text);margin-bottom:3px}.list{display:grid;gap:10px}.item{border:1px solid var(--line);border-radius:12px;padding:14px;background:#111624}
    .itemtop{display:flex;justify-content:space-between;gap:10px}.count,.good{color:var(--good);font-weight:800}.bad{color:var(--bad)}.names{color:var(--muted);font-size:14px;margin-top:6px}.status{min-height:24px;margin-top:12px;color:var(--good)}.error{color:var(--bad)}.hidden{display:none}.week{color:var(--good);font-weight:700}
  </style>
</head>
<body><main>
  <header><h1>公會每週排團</h1><p>每週四更新。成員填寫週四至下週三的空閒時間，團長可安排固定團隊。</p><div id="weekLabel" class="week"></div></header>
  <nav class="tabs"><button data-view="fill" class="active">填寫時間</button><button data-view="summary">本週統計</button><button data-view="teams">固定團隊</button></nav>

  <section id="fillView">
    <div class="card"><h2>成員資料</h2><div class="row"><label>遊戲名稱<input id="memberName" maxlength="30" placeholder="例如：勇者阿明"></label><button id="loadMine" class="secondary">載入之前填寫</button></div></div>
    <div class="card"><h2>本週有空時段</h2><div id="slots" class="slots"></div><div class="row" style="margin-top:18px"><button id="submit">送出／更新時間</button><button id="clear" class="secondary">清除勾選</button></div><div id="status" class="status"></div></div>
  </section>

  <section id="summaryView" class="hidden"><div class="card"><div class="itemtop"><h2>本週熱門時段</h2><button id="refresh" class="secondary">重新整理</button></div><div id="summary" class="list"></div><div id="summaryStatus" class="status"></div></div></section>

  <section id="teamsView" class="hidden">
    <div class="card"><h2>建立／更新固定團隊</h2><p>固定成員請用頓號或逗號分隔。使用相同團名再次儲存即可更新。</p><div class="row">
      <label>團隊名稱<input id="teamName" maxlength="30" placeholder="例如：XX團"></label>
      <label>固定星期<select id="teamDay"><option value="4">週四</option><option value="5">週五</option><option value="6">週六</option><option value="0">週日</option><option value="1">週一</option><option value="2">週二</option><option value="3">週三</option></select></label>
      <label>固定時間<select id="teamTime"></select></label>
      <label>固定成員<input id="teamMembers" placeholder="阿明、阿美、阿強"></label>
      <button id="saveTeam">儲存團隊</button>
    </div><div id="teamStatus" class="status"></div></div>
    <div class="card"><div class="itemtop"><h2>團隊適合度</h2><button id="refreshTeams" class="secondary">重新整理</button></div><div id="teamList" class="list"></div></div>
  </section>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbw_CwG4rz3W1XpWSMmWaEJtpIhtxxHEqTtOWwGbzIN4Btl6eh9MVW8bhIVSY3TR9ME/exec";
const TIMES=["20:00","21:00","22:00"];
const $=id=>document.getElementById(id);
function dateKey(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`}
function displayDate(key){return new Intl.DateTimeFormat("zh-TW",{month:"numeric",day:"numeric",weekday:"short"}).format(new Date(key+"T12:00:00"))}
function cycleStart(){const d=new Date();d.setHours(12,0,0,0);d.setDate(d.getDate()-((d.getDay()+3)%7));return d}
const start=cycleStart(),end=new Date(start);end.setDate(end.getDate()+6);const weekKey=dateKey(start);
$("weekLabel").textContent=`本週填寫範圍：${displayDate(weekKey)} 至 ${displayDate(dateKey(end))}`;
function renderSlots(){let html="";for(let i=0;i<7;i++){const d=new Date(start);d.setDate(d.getDate()+i);for(const t of TIMES){const value=`${dateKey(d)} ${t}`;html+=`<label class="slot"><input type="checkbox" value="${value}"><strong>${displayDate(dateKey(d))}</strong>${t}</label>`}}$("slots").innerHTML=html}
$("teamTime").innerHTML=TIMES.map(t=>`<option>${t}</option>`).join("");
function selected(){return [...document.querySelectorAll("#slots input:checked")].map(x=>x.value)}
function status(msg,bad=false,target=$("status")){target.textContent=msg;target.classList.toggle("error",bad)}
async function api(action,data={}){if(API_URL.startsWith("PASTE_"))throw Error("尚未連接 Google 試算表，請依 README 完成設定。");const r=await fetch(API_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify({action,...data})});const out=await r.json();if(!out.ok)throw Error(out.error||"資料處理失敗");return out}
async function save(){const name=$("memberName").value.trim(),slots=selected();if(!name)return status("請填寫遊戲名稱。",true);if(!slots.length)return status("請至少勾選一個時段。",true);try{status("正在送出...");await api("save",{name,weekKey,slots});localStorage.setItem("guildMemberName",name);status("本週時間已成功更新。")}catch(e){status(e.message,true)}}
async function loadMine(){const name=$("memberName").value.trim();if(!name)return status("請填寫遊戲名稱。",true);try{const r=await api("mine",{name,weekKey});const mine=new Set(r.slots||[]);document.querySelectorAll("#slots input").forEach(x=>x.checked=mine.has(x.value));status(mine.size?"已載入本週之前填寫的時間。":"本週尚未填寫。")}catch(e){status(e.message,true)}}
async function loadSummary(){try{status("載入中...",false,$("summaryStatus"));const r=await api("summary",{weekKey});$("summary").innerHTML=(r.summary||[]).map(x=>`<div class="item"><div class="itemtop"><strong>${displayDate(x.slot.split(" ")[0])} ${x.slot.split(" ")[1]}</strong><span class="count">${x.names.length} 人</span></div><div class="names">${x.names.join("、")}</div></div>`).join("")||"<p>本週尚未有人填寫。</p>";status("",false,$("summaryStatus"))}catch(e){status(e.message,true,$("summaryStatus"))}}
async function saveTeam(){const name=$("teamName").value.trim(),members=$("teamMembers").value.split(/[、,，]/).map(x=>x.trim()).filter(Boolean);if(!name)return status("請填寫團隊名稱。",true,$("teamStatus"));try{await api("saveTeam",{name,day:Number($("teamDay").value),time:$("teamTime").value,members});status("團隊已儲存。",false,$("teamStatus"));loadTeams()}catch(e){status(e.message,true,$("teamStatus"))}}
async function loadTeams(){try{const r=await api("teams",{weekKey});$("teamList").innerHTML=(r.teams||[]).map(t=>`<div class="item"><div class="itemtop"><strong>${t.name}｜${t.dayName} ${t.time}</strong><span class="count">${t.availableAssigned.length}/${t.members.length} 固定成員有空</span></div><div class="names good">固定成員有空：${t.availableAssigned.join("、")||"無"}</div><div class="names bad">固定成員沒勾選：${t.unavailableAssigned.join("、")||"無"}</div><div class="names">其他適合成員：${t.suggested.join("、")||"無"}</div></div>`).join("")||"<p>尚未設定固定團隊。</p>"}catch(e){$("teamList").innerHTML=`<p class="bad">${e.message}</p>`}}
function show(view){["fill","summary","teams"].forEach(v=>$(v+"View").classList.toggle("hidden",v!==view));document.querySelectorAll(".tabs button").forEach(b=>b.classList.toggle("active",b.dataset.view===view));if(view==="summary")loadSummary();if(view==="teams")loadTeams()}
renderSlots();$("memberName").value=localStorage.getItem("guildMemberName")||"";$("submit").onclick=save;$("loadMine").onclick=loadMine;$("clear").onclick=()=>document.querySelectorAll("#slots input").forEach(x=>x.checked=false);$("refresh").onclick=loadSummary;$("saveTeam").onclick=saveTeam;$("refreshTeams").onclick=loadTeams;document.querySelectorAll(".tabs button").forEach(b=>b.onclick=()=>show(b.dataset.view));
</script></main></body></html>
