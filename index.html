<!DOCTYPE html>
<html lang="zh-TW">
<head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐉 公會龍王團 出團時間表</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
:root{--bg:#0f1117;--surface:#181c27;--border:#272d40;--gold:#d4a843;--gold-dim:#7a5e22;--text:#cdd2e0;--muted:#5a6180;--green:#2ea86e;--green-bg:rgba(46,168,110,.15);--yellow:#d4a843;--yel-bg:rgba(212,168,67,.15);--red:#e05252;--red-bg:rgba(224,82,82,.18);--grey-bg:rgba(90,97,128,.12);}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:0 0 60px}
.header{text-align:center;padding:24px 16px 0}
.header h1{font-size:clamp(1.3rem,4vw,1.9rem);font-weight:700;color:var(--gold);letter-spacing:.05em}
.header p{color:var(--muted);font-size:.8rem;margin-top:5px}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;max-width:1200px;margin:14px auto 10px;padding:0 14px}
.btn{padding:7px 14px;border-radius:6px;font-size:.78rem;font-weight:600;cursor:pointer;border:1px solid;font-family:inherit;transition:all .15s}
.btn-view{background:rgba(90,97,128,.15);border-color:var(--muted);color:var(--muted)}
.btn-time{background:rgba(212,168,67,.12);border-color:var(--gold);color:var(--gold)}
.btn-member{background:rgba(46,168,110,.1);border-color:#5de0a5;color:#5de0a5}
.btn-save{background:rgba(91,143,214,.12);border-color:#5b8fd6;color:#8bb8f0}
.btn-signup{background:rgba(212,168,67,.12);border-color:var(--gold);color:var(--gold)}
.mode-badge{font-size:.7rem;padding:3px 10px;border-radius:10px;background:rgba(90,97,128,.15);color:var(--muted);border:1px solid var(--muted)}
#syncStatus{font-size:.72rem;margin-left:auto;color:var(--muted)}
.legend{display:flex;flex-wrap:wrap;gap:8px 18px;justify-content:center;margin-bottom:10px}
.legend-item{display:flex;align-items:center;gap:5px;font-size:.75rem;color:var(--muted)}
.dot{width:11px;height:11px;border-radius:3px;flex-shrink:0}
/* week tabs */
.week-tabs{display:flex;max-width:1200px;margin:0 auto 0;padding:0 14px;gap:8px}
.week-tab{flex:1;padding:8px 12px;border-radius:7px 7px 0 0;border:1px solid var(--border);border-bottom:none;cursor:pointer;text-align:center;background:#0d1019;position:relative;user-select:none}
.week-tab.active{background:var(--surface);border-color:var(--gold)}
.week-tab .wtab-label{font-size:.63rem;color:var(--muted);text-transform:uppercase}
.week-tab.active .wtab-label{color:var(--gold)}
.week-tab .wtab-date{font-size:.78rem;font-weight:600;color:var(--text);margin-top:2px}
.week-tab .wtab-sub{font-size:.6rem;color:var(--muted);margin-top:2px}
.week-tab .wtab-badge{position:absolute;top:-7px;right:6px;font-size:.58rem;padding:1px 6px;border-radius:7px;background:var(--gold);color:#0f1117;font-weight:700;display:none}
/* filter */
.team-filter{display:flex;flex-wrap:wrap;gap:6px;align-items:center;max-width:1200px;margin:0 auto 8px;padding:0 14px}
.filter-label{font-size:.68rem;color:var(--muted)}
.filter-btn{font-size:.68rem;padding:3px 10px;border-radius:12px;border:1px solid var(--border);background:rgba(255,255,255,.03);color:var(--muted);cursor:pointer;font-family:inherit;transition:all .12s}
.filter-btn.active{background:rgba(212,168,67,.12);border-color:var(--gold);color:var(--gold)}
/* table */
.table-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--border);max-width:1200px;margin:0 auto}
table{width:100%;border-collapse:collapse;font-size:.8rem;white-space:nowrap}
thead th{padding:10px 8px;font-weight:500;color:var(--muted);text-align:center;border-bottom:2px solid var(--border);font-size:.73rem;text-transform:uppercase}
thead th.day-th{color:var(--gold);font-weight:600}
thead th:first-child{text-align:left;padding-left:14px;min-width:180px}
thead th.note-th{min-width:140px}
/* group rows */
tr.group-row td{padding:0}
.group-avail-bar{display:flex;align-items:center;flex-wrap:wrap;gap:6px;padding:8px 12px;border-left:3px solid;background:#111420}
.avail-label{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.cnt-badge{font-size:.65rem;padding:1px 7px;border-radius:8px;background:rgba(255,255,255,.06);color:var(--muted)}
.cnt-warn{background:rgba(224,82,82,.15)!important;color:#e05252!important;font-weight:700}
.raid-time-wrap{display:inline-flex;align-items:center;gap:5px;margin-left:6px}
.raid-time-label{font-size:.68rem;color:var(--muted);white-space:nowrap}
.raid-time-input{background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:4px;color:var(--gold);font-size:.72rem;font-weight:500;padding:3px 8px;width:200px;outline:none;font-family:inherit}
.avail-slot-tag{padding:2px 8px;border-radius:4px;font-size:.68rem;background:var(--green-bg);color:#5de0a5;border:1px solid rgba(46,168,110,.25);white-space:nowrap}
/* sug */
.sug-tr td{padding:0}
.sug-wrap{border-left:3px solid;border-top:1px solid var(--border);background:#0d1019}
.sug-toggle{width:100%;text-align:left;background:none;border:none;cursor:pointer;padding:7px 14px;font-size:.73rem;color:var(--muted);font-family:inherit;display:flex;align-items:center;gap:6px}
.sug-toggle:hover{color:var(--text)}
.sug-count{background:rgba(212,168,67,.15);color:var(--gold);border-radius:8px;padding:0 7px;font-size:.65rem}
.sug-chevron{margin-left:auto;font-size:.7rem}
.sug-body{padding:0 14px 10px}
.sug-section-title{font-size:.73rem;font-weight:700;color:var(--muted);margin:6px 0 4px}
.sug-avail-wrap{display:flex;flex-wrap:wrap;gap:4px}
.sug-row{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;padding:4px 0;border-top:1px solid #1a1e2e;font-size:.72rem}
.sug-day{color:var(--gold);font-weight:600;white-space:nowrap;min-width:52px}
b.name-red{color:#f08080;font-weight:600}
b.num-green{color:#5de0a5;font-weight:600}
b.time-gold{color:var(--gold);font-weight:600}
/* member rows */
tbody tr.member{border-bottom:1px solid #1e2235}
tbody tr.member:hover{background:rgba(255,255,255,.02)}
.cell-name{padding:9px 8px 9px 14px;vertical-align:middle}
.name-wrap{display:flex;align-items:center;gap:6px}
.ef{background:transparent;border:none;outline:none;font-family:'Noto Sans TC',sans-serif;color:var(--text);font-size:.8rem}
.name-ef{font-weight:500;max-width:90px}
.lv-ef{font-size:.65rem;color:var(--gold-dim);max-width:38px}
.job-ef{font-size:.65rem;color:var(--muted);max-width:110px;padding:1px 5px;border-radius:3px;background:rgba(255,255,255,.05)}
.gname-ef{font-weight:700;letter-spacing:.06em;font-size:.75rem}
.edit-mode .ef{border-bottom:1px dashed rgba(212,168,67,.35);background:rgba(212,168,67,.04);border-radius:3px 3px 0 0;padding:1px 3px}
.ef:focus{border-color:var(--gold)!important;background:rgba(212,168,67,.1)!important}
/* cells */
td.avail{text-align:center;padding:0;min-width:88px;vertical-align:middle}
.cell-top{width:100%;cursor:pointer}
.cell-inner{margin:3px;border-radius:5px;padding:5px 3px;font-size:.7rem;line-height:1.35;white-space:normal;word-break:keep-all}
.cell-inner.all-day{background:var(--green-bg);color:#5de0a5}
.cell-inner.partial{background:var(--yel-bg);color:#e8c56a}
.cell-inner.no{background:var(--red-bg);color:#f08080}
.cell-inner.empty{background:var(--red-bg);color:#f08080}
.time-ef{background:transparent;border:none;outline:none;font-family:'Noto Sans TC',sans-serif;font-size:.68rem;color:inherit;width:100%;text-align:center;pointer-events:none}
td.note-cell{padding:2px 8px 2px 4px;min-width:140px;max-width:200px;white-space:normal;word-break:break-all;font-size:.68rem;color:var(--muted);vertical-align:middle;line-height:1.4}
.note-ef{background:transparent;border:none;outline:none;resize:none;font-family:'Noto Sans TC',sans-serif;font-size:.68rem;color:var(--muted);width:100%;min-height:28px;line-height:1.4}
/* del/drag */
.del-row-btn{display:none;width:20px;height:20px;border-radius:50%;background:var(--red-bg);border:1px solid rgba(224,82,82,.5);color:#f08080;font-size:.7rem;cursor:pointer;align-items:center;justify-content:center;flex-shrink:0;line-height:1;padding:0}
.edit-mode .del-row-btn{display:inline-flex}
.drag-handle{display:none;cursor:grab;color:var(--muted);font-size:.85rem;padding:0 2px;flex-shrink:0}
.edit-mode .drag-handle{display:inline-flex;align-items:center}
tr.dragging{opacity:.4}
tr.drag-over{outline:2px solid var(--gold);outline-offset:-2px}
/* time-only */
.time-only .name-ef,.time-only .lv-ef,.time-only .job-ef,.time-only .note-ef{border-bottom:none!important;background:transparent!important;cursor:default}
.time-only .del-row-btn{display:none!important}
.time-only .drag-handle{display:none!important}
.time-only .gname-ef{pointer-events:none!important;border-bottom:none!important;background:transparent!important}
/* group collapse */
.group-collapse-btn{background:none;border:none;cursor:pointer;padding:0 6px 0 0;color:var(--muted);font-size:.75rem;line-height:1}
/* week locked */
.week-locked-msg{text-align:center;padding:36px 20px;color:var(--muted)}
.lock-icon{font-size:1.8rem;margin-bottom:8px}
.lock-title{font-size:.85rem;color:#5a6180;margin-bottom:4px}
.lock-sub{font-size:.72rem;color:#3a3f55}
.lock-countdown{font-size:.75rem;color:var(--gold);margin-top:8px}
/* panels */
.panels-wrap{max-width:1200px;margin:16px auto 0;padding:0 14px}
.suggestion-panel{background:var(--surface);border:1px solid;border-radius:8px;padding:12px 16px}
.sug-title{font-size:.76rem;font-weight:700;letter-spacing:.05em;margin-bottom:6px}
/* modals */
.pw-title{font-size:.95rem;font-weight:600;color:#d4a843;margin-bottom:6px;letter-spacing:.05em}
.pw-sub{font-size:.75rem;color:#5a6180;margin-bottom:18px}
/* signup */
.signup-field{margin-bottom:12px}
.signup-label{display:block;font-size:.7rem;color:var(--muted);margin-bottom:5px;letter-spacing:.04em}
.signup-input{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:5px;color:var(--text);font-family:inherit;font-size:.82rem;padding:8px 11px;outline:none;box-sizing:border-box}
.signup-input:focus{border-color:var(--gold)}
select.signup-input{cursor:pointer;-webkit-appearance:none;appearance:none}
select.signup-input option{background:#181c27;color:var(--text)}
select.signup-input optgroup{background:#0f1117;color:var(--gold);font-weight:700}
.su-day-btn{padding:7px 6px;border-radius:5px;border:1px solid var(--border);background:rgba(255,255,255,.03);color:var(--muted);font-family:inherit;font-size:.72rem;cursor:pointer;text-align:center;transition:all .15s;line-height:1.3}
.su-day-btn.active{border-color:var(--gold);background:rgba(212,168,67,.12);color:#f0d080;font-weight:600}
.su-day-input{width:100%;margin-top:4px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:inherit;font-size:.68rem;padding:4px 6px;outline:none;display:none;box-sizing:border-box}
.su-day-btn.active + .su-day-input{display:block}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
.shake{animation:shake .35s ease}
</style>
</head>
<body>
<div class="header">
  <h1>🐉 公會龍王團 出團時間表</h1>
  <p id="dateRangeLabel">— 讀取日期中 —</p>
</div>
<div class="toolbar">
  <span class="mode-badge" id="modeBadge">👁 檢視模式</span>
  <button class="btn btn-signup" id="btnSignup" onclick="showSignupModal()">⚔️ 我要報名</button>
  <button class="btn btn-view" id="btnView" onclick="setMode('view')" style="display:none">👁 檢視模式</button>
  <button class="btn btn-time" id="btnTime" onclick="setMode('time')">✏️ 修改時間</button>
  <button class="btn btn-member" id="btnMember" onclick="setMode('member')">👥 調整成員</button>
  <button class="btn btn-save" id="saveBtn" onclick="saveData()" style="display:none">💾 儲存變更</button>
  <span id="syncStatus" style="font-size:.72rem;margin-left:auto;color:#5a6180">⟳ 讀取中…</span>
</div>
<div class="legend">
  <div class="legend-item"><div class="dot" style="background:var(--green)"></div>整天可</div>
  <div class="legend-item"><div class="dot" style="background:var(--yellow)"></div>部分時段可</div>
  <div class="legend-item"><div class="dot" style="background:var(--red)"></div>不可 ✗</div>
  <div class="legend-item"><div class="dot" style="background:#333a52"></div>未填寫</div>
</div>
<div class="week-tabs">
  <div class="week-tab active" id="wtab-this" onclick="switchWeek('this')">
    <div class="wtab-label">本週</div>
    <div class="wtab-date" id="wtab-this-date">—</div>
    <div class="wtab-sub" id="wtab-this-sub"></div>
  </div>
  <div class="week-tab" id="wtab-next" onclick="switchWeek('next')">
    <span class="wtab-badge" id="wtab-next-badge">填寫中</span>
    <div class="wtab-label">下週</div>
    <div class="wtab-date" id="wtab-next-date">—</div>
    <div class="wtab-sub" id="wtab-next-sub"></div>
  </div>
</div>
<div class="team-filter" id="teamFilter">
  <span class="filter-label">顯示：</span>
</div>
<div class="table-wrap">
<table id="mainTable">
  <thead><tr>
    <th>成員</th>
    <th class="day-th" id="dh0">—</th><th class="day-th" id="dh1">—</th>
    <th class="day-th" id="dh2">—</th><th class="day-th" id="dh3">—</th>
    <th class="day-th" id="dh4">—</th><th class="day-th" id="dh5">—</th>
    <th class="day-th" id="dh6">—</th>
    <th class="note-th">備註</th>
  </tr></thead>
  <tbody id="tableBody"></tbody>
</table>
</div>
<div class="panels-wrap"><div id="thirdTeamPanel"></div></div>

<!-- Password Modal -->
<div id="pwModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(4px)">
  <div id="pwBox" style="background:#181c27;border:1px solid #2a2a42;border-radius:12px;padding:32px 28px;width:300px;max-width:90vw;text-align:center">
    <div style="font-size:1.8rem;margin-bottom:12px">🔐</div>
    <div class="pw-title" id="pwTitle">輸入密碼</div>
    <div class="pw-sub" id="pwSub">此操作需要密碼</div>
    <input id="pwInput" type="password" placeholder="••••" style="width:100%;background:#0f1117;border:1px solid #272d40;border-radius:6px;color:#cdd2e0;font-size:1.1rem;padding:10px 14px;outline:none;text-align:center;letter-spacing:.3em;font-family:inherit;box-sizing:border-box" onkeydown="if(event.key==='Enter')submitPw();if(event.key==='Escape')closePw()">
    <div id="pwError" style="display:none;color:#f08080;font-size:.72rem;margin-top:8px">密碼錯誤</div>
    <div style="display:flex;gap:10px;margin-top:18px">
      <button onclick="closePw()" style="flex:1;padding:9px;border-radius:6px;border:1px solid #272d40;background:none;color:#5a6180;cursor:pointer;font-family:inherit;font-size:.8rem">取消</button>
      <button onclick="submitPw()" style="flex:1;padding:9px;border-radius:6px;border:1px solid #d4a843;background:rgba(212,168,67,.12);color:#d4a843;cursor:pointer;font-family:inherit;font-size:.8rem;font-weight:600">確認</button>
    </div>
  </div>
</div>

<!-- Clear Modal -->
<div id="clearModal" style="display:none;position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:300">
  <div style="background:#181c27;border:1px solid var(--gold);border-radius:10px;padding:16px 20px;width:360px;max-width:92vw;box-shadow:0 8px 32px rgba(0,0,0,.6)">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
      <span>🗑️</span><div id="clearTitle" style="font-size:.82rem;font-weight:600;color:#d4a843"></div>
    </div>
    <div id="clearDesc" style="font-size:.72rem;color:#5a6180;margin-bottom:12px;line-height:1.6;white-space:pre-wrap"></div>
    <div style="display:flex;gap:8px">
      <button id="clearNoBtn" style="flex:1;padding:7px;border-radius:6px;border:1px solid #e05252;background:rgba(224,82,82,.15);color:#f08080;cursor:pointer;font-family:inherit;font-size:.75rem;font-weight:700">✕ 否，只改我的</button>
      <button id="clearYesBtn" style="flex:1;padding:7px;border-radius:6px;border:1px solid #3a3a52;background:rgba(255,255,255,.05);color:#9a9ab0;cursor:pointer;font-family:inherit;font-size:.75rem">✅ 是，清除全團</button>
    </div>
  </div>
</div>

<!-- Signup Modal -->
<div id="signupModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:400;align-items:center;justify-content:center;backdrop-filter:blur(4px)">
  <div style="background:#181c27;border:1px solid #d4a843;border-radius:12px;padding:28px 24px;width:380px;max-width:92vw;max-height:90vh;overflow-y:auto">
    <div style="font-size:1.4rem;text-align:center;margin-bottom:4px">⚔️</div>
    <div style="font-size:.95rem;font-weight:700;color:#d4a843;text-align:center;margin-bottom:4px">我要報名</div>
    <div style="font-size:.72rem;color:#5a6180;text-align:center;margin-bottom:20px">填寫完畢後資訊將加入散人候補</div>
    <div class="signup-field"><label class="signup-label">遊戲名稱</label><input id="su-name" class="signup-input" placeholder="你的角色名稱" maxlength="20"></div>
    <div style="display:flex;gap:10px">
      <div class="signup-field" style="flex:1"><label class="signup-label">等級</label><input id="su-lv" class="signup-input" placeholder="e.g. 170" type="number"></div>
      <div class="signup-field" style="flex:2"><label class="signup-label">職業</label><select id="su-job" class="signup-input"><option value="">請選擇職業</option></select></div>
    </div>
    <div class="signup-label" style="margin-top:14px;margin-bottom:6px">可參加時段</div>
    <div id="su-days" style="display:grid;grid-template-columns:1fr 1fr;gap:6px"></div>
    <div id="su-err" style="display:none;color:#f08080;font-size:.72rem;margin-top:10px;text-align:center"></div>
    <div style="display:flex;gap:10px;margin-top:18px">
      <button onclick="closeSignupModal()" style="flex:1;padding:9px;border-radius:6px;border:1px solid #272d40;background:none;color:#5a6180;cursor:pointer;font-family:inherit;font-size:.8rem">取消</button>
      <button onclick="submitSignup()" style="flex:2;padding:9px;border-radius:6px;border:1px solid #d4a843;background:rgba(212,168,67,.15);color:#d4a843;cursor:pointer;font-family:inherit;font-size:.8rem;font-weight:700">⚔️ 確認報名</button>
    </div>
  </div>
</div>

<script>
// ── API ───────────────────────────────────────────────────────────────────────
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw_CwG4rz3W1XpWSMmWaEJtpIhtxxHEqTtOWwGbzIN4Btl6eh9MVW8bhIVSY3TR9ME/exec';
let _localVersion = 0;

// ── Week helpers ──────────────────────────────────────────────────────────────
function getThisThursday() {
  const now = new Date(), dow = now.getDay();
  const d = new Date(now);
  d.setHours(0,0,0,0);
  d.setDate(now.getDate() - (dow+7-4)%7);
  return d;
}
function getNextThursday() {
  const d = getThisThursday();
  d.setDate(d.getDate()+7);
  return d;
}
function isNextWeekUnlocked() {
  const dow = new Date().getDay();
  return dow===6||dow===0||dow===1||dow===2||dow===3;
}
function msToCountdown(ms) {
  const h=Math.floor(ms/3600000), mn=Math.floor((ms%3600000)/60000);
  if(h>24) return Math.floor(h/24)+'天後';
  if(h>0) return h+'小時'+mn+'分後';
  return mn+'分後';
}
function getWeekDaysFrom(thu) {
  const N=['日','一','二','三','四','五','六'], days=[];
  for(let i=0;i<7;i++){
    const d=new Date(thu); d.setDate(thu.getDate()+i);
    const mm=String(d.getMonth()+1).padStart(2,'0');
    const dd=String(d.getDate()).padStart(2,'0');
    days.push(mm+'/'+dd+' '+N[d.getDay()]);
  }
  return days;
}
function computeWeekDays(){ return getWeekDaysFrom(getThisThursday()); }

// ── State ─────────────────────────────────────────────────────────────────────
let DAYS_LABEL = [];

// ── Time parsing ──────────────────────────────────────────────────────────────
function parseTimeRange(t) {
  if(!t||t==='—'||t==='✗') return null;
  const s=t.replace(/：/g,':').replace(/[～~]/g,'–').trim();
  if(/整天|整日|都可以|可/.test(s)) return {start:0,end:null,crossMidnight:false};
  if(/避開|不一定|暫定/.test(s)) return null;
  function hm(str) {
    str=(str||'').trim();
    let m=str.match(/^(\d{1,2}):(\d{2})/); if(m) return parseInt(m[1])*60+parseInt(m[2]);
    m=str.match(/^(\d{4})$/); if(m) return parseInt(str.slice(0,2))*60+parseInt(str.slice(2));
    m=str.match(/晚[上]?(\d+)點(半)?/); if(m){let h=parseInt(m[1]);if(h<12)h+=12;return h*60+(m[2]?30:0);}
    m=str.match(/下午(\d+)點(半)?/); if(m){let h=parseInt(m[1]);if(h<12)h+=12;return h*60+(m[2]?30:0);}
    return null;
  }
  const bm=s.match(/^(.+?)\s*前$/);
  if(bm){const v=hm(bm[1]);if(v!==null)return{start:0,end:v,crossMidnight:false};}
  const rm=s.match(/(\d{1,2}:\d{2})\s*[-–—]\s*(\d{1,2}:\d{2})/);
  if(rm){const st=hm(rm[1]);let en=hm(rm[2]);if(st!==null&&en!==null){const cross=en<st;if(cross)en+=24*60;return{start:st,end:en,crossMidnight:cross};}}
  const v=hm(s); if(v!==null) return{start:v,end:null,crossMidnight:false};
  return null;
}
function minsToStr(m){const h=Math.floor(m/60)%24,mn=m%60;return String(h).padStart(2,'0')+':'+String(mn).padStart(2,'0');}
function windowToStr(w){
  if(!w) return null;
  if(w.start===0&&!w.end) return '整天';
  if(!w.end) return minsToStr(w.start)+' 後';
  return minsToStr(w.start)+'–'+(w.end>=1440?'翌日':'')+minsToStr(w.end);
}
function overlapWindow(members,di){
  members=(members||[]).filter(m=>m&&Array.isArray(m.days)&&Array.isArray(m.times));
  const filled=members.filter(m=>m.days[di]!=='empty'&&m.days[di]!=='no');
  if(!filled.length||members.some(m=>m.days[di]==='no'||m.days[di]==='empty')) return null;
  let ws=0,we=null;
  for(const m of filled){
    const r=parseTimeRange(m.times[di]);
    if(!r) continue;
    if(r.start>ws) ws=r.start;
    if(r.end!==null&&(we===null||r.end<we)) we=r.end;
  }
  if(we!==null&&ws>=we) return null;
  return{start:ws,end:we};
}
function getGroupAvail(members){
  members=(members||[]).filter(m=>m&&Array.isArray(m.days)&&Array.isArray(m.times));
  return DAYS_LABEL.map((_,di)=>{const w=overlapWindow(members,di);return w?{timeStr:windowToStr(w),window:w}:null;});
}
function getSuggestions(members){
  members=(members||[]).filter(m=>m&&Array.isArray(m.days)&&Array.isArray(m.times));
  const sugs=[];
  DAYS_LABEL.forEach((day,di)=>{
    const filled=members.filter(m=>m.days[di]!=='empty');
    if(!filled.length) return;
    const blockers=filled.filter(m=>m.days[di]==='no'||m.days[di]==='empty');
    const canGo=filled.filter(m=>m.days[di]!=='no'&&m.days[di]!=='empty');
    if(!blockers.length||blockers.length>3||canGo.length<2) return;
    let ws=0,we=null;
    for(const m of canGo){const r=parseTimeRange(m.times[di]);if(!r)continue;if(r.start>ws)ws=r.start;if(r.end!==null&&(we===null||r.end<we))we=r.end;}
    if(we!==null&&ws>=we) return;
    sugs.push({day,blockers:blockers.map(m=>m.name),available:canGo.length,window:windowToStr({start:ws,end:we})});
  });
  return sugs;
}
function getFilledMembers(gi){
  const g=groups[gi];
  if(!g||!Array.isArray(g.members)) return [];
  return g.members.filter(m=>{
    if(!m) return false;
    const d=currentWeekView==='next'?(m.nextWeek||{days:[]}).days:m.days;
    return Array.isArray(d)&&d.some(x=>x!=='empty');
  });
}
function getMemberWeekData(m,week){
  if(week==='next'){if(!m.nextWeek)m.nextWeek={days:Array(7).fill('empty'),times:Array(7).fill('—')};return m.nextWeek;}
  return{days:m.days,times:m.times};
}

// ── Week tabs UI ──────────────────────────────────────────────────────────────
function updateWeekTabs(){
  const thu=getThisThursday(),nxt=getNextThursday();
  const N=['日','一','二','三','四','五','六'];
  function wr(d){const e=new Date(d);e.setDate(d.getDate()+6);const fmt=x=>(x.getMonth()+1)+'/'+x.getDate()+'('+N[x.getDay()]+')';return fmt(d)+'—'+fmt(e);}
  document.getElementById('wtab-this-date').textContent=wr(thu);
  document.getElementById('wtab-next-date').textContent=wr(nxt);
  document.getElementById('wtab-this-sub').textContent='剩 '+msToCountdown(nxt-new Date())+' 結束';
  const unlocked=isNextWeekUnlocked();
  const badge=document.getElementById('wtab-next-badge');
  if(unlocked){badge.style.display='';document.getElementById('wtab-next-sub').textContent='開放填寫中';}
  else{badge.style.display='none';const ns=new Date();while(ns.getDay()!==6||ns<=new Date()){ns.setDate(ns.getDate()+1);}document.getElementById('wtab-next-sub').textContent=msToCountdown(ns-new Date())+'後開放';}
}
function switchWeek(w){
  currentWeekView=w;
  document.getElementById('wtab-this').classList.toggle('active',w==='this');
  document.getElementById('wtab-next').classList.toggle('active',w==='next');
  DAYS_LABEL=getWeekDaysFrom(w==='next'?getNextThursday():getThisThursday());
  updateDateHeader(); buildTable();
}
function updateDateHeader(){
  const thu=currentWeekView==='next'?getNextThursday():getThisThursday();
  DAYS_LABEL=getWeekDaysFrom(thu);
  const first=DAYS_LABEL[0].replace(' ','（')+')';
  const last=DAYS_LABEL[6].replace(' ','（')+')';
  const el=document.getElementById('dateRangeLabel');
  if(el) el.innerHTML=first+'—'+last+'&nbsp;·&nbsp; 龍王 / 炎魔 / 困拉';
  DAYS_LABEL.forEach((d,i)=>{
    const th=document.getElementById('dh'+i);
    if(!th) return;
    const parts=d.split(' ');
    th.innerHTML=parts[0]+'<br><span style="font-weight:300;font-size:.68rem">'+parts[1]+'</span>';

// ── Team filter ───────────────────────────────────────────────────────────────
function buildTeamFilter(){
  const bar=document.getElementById('teamFilter');
  if(!bar) return;
  bar.innerHTML='<span class="filter-label">顯示：</span>';
  // "全部" button
  const allBtn=document.createElement('button');
  allBtn.className='filter-btn'+(_visibleGroups===null?' active':'');
  allBtn.textContent='全部';
  allBtn.onclick=()=>{_visibleGroups=null;buildTeamFilter();buildTable();};
  bar.appendChild(allBtn);
  // Each team button (multi-select)
  groups.forEach((g,gi)=>{
    const color=GROUP_COLORS[g.colorIdx%4];
    const sel=_visibleGroups!==null&&_visibleGroups.includes(gi);
    const btn=document.createElement('button');
    btn.className='filter-btn'+(sel?' active':'');
    btn.textContent=g.name;
    if(sel){btn.style.borderColor=color;btn.style.color=color;}
    btn.onclick=()=>{
      if(_visibleGroups===null){
        // currently showing all -> start a new selection with just this team
        _visibleGroups=[gi];
      } else if(_visibleGroups.includes(gi)){
        // deselect this team
        _visibleGroups=_visibleGroups.filter(x=>x!==gi);
        if(_visibleGroups.length===0) _visibleGroups=null; // none left -> show all
      } else {
        // add this team to selection
        _visibleGroups=[..._visibleGroups,gi];
      }
      // if every team is now selected -> collapse to "全部"
      if(_visibleGroups!==null&&_visibleGroups.length===groups.length) _visibleGroups=null;
      buildTeamFilter(); buildTable();
    };
    bar.appendChild(btn);
  });
  // "全部取消" button (clear selection -> show all)
  const clearBtn=document.createElement('button');
  clearBtn.className='filter-btn';
  clearBtn.textContent='✕ 全部取消';
  clearBtn.style.marginLeft='auto';
  clearBtn.style.color='#f08080';
  clearBtn.style.borderColor='rgba(224,82,82,.4)';
  clearBtn.onclick=()=>{_visibleGroups=null;buildTeamFilter();buildTable();};
  bar.appendChild(clearBtn);
}

      if(name.includes(q)||job.includes(q)) return true;

  if(!matchCount) list='<div style="text-align:center;color:#5a6180;font-size:.8rem;padding:24px 0">找不到符合的成員</div>';
  wrap.innerHTML=list;

// ── Normalize time ────────────────────────────────────────────────────────────
function normalizeTime(raw){
  if(!raw) return raw;
  const t=raw.trim();
  if(/^(都可以?|都行|[Oo]|整天|整日|都可)$/.test(t)) return '整天';
  if(t==='—'||t==='✗'||t==='整天'||t==='可') return t;
  let s=t.replace(/：/g,':');
  s=s.replace(/^(\d{2})(\d{2})\s*[-–]\s*(\d{2})(\d{2})$/,'$1:$2–$3:$4');
  s=s.replace(/^(\d{2})(\d{2})$/,'$1:$2');
  const rm=s.match(/(\d{1,2}:\d{2})\s*[-–]\s*(\d{1,2}:\d{2})/);
  if(rm) return s;
  const bm=s.match(/^(.+?)\s*前$/); if(bm){const v=parseHM(bm[1]);if(v!==null)return minsToStr(v)+'前';}
  const v=parseHM(s); if(v!==null) return minsToStr(v)+'後';
  return '✗';
}
function parseHM(s){
  s=(s||'').trim();
  let m=s.match(/^(\d{1,2}):(\d{2})/); if(m){let h=parseInt(m[1]),mn=parseInt(m[2]);if(h<12)h+=12;return h*60+mn;}
  m=s.match(/晚[上]?(\d+)點(半)?/); if(m){let h=parseInt(m[1]);if(h<12)h+=12;return h*60+(m[2]?30:0);}
  m=s.match(/^(\d+)$/); if(m){let h=parseInt(m[1]);if(h<12)h+=12;return h*60;}
  return null;
}

  t.textContent='是否清除'+groupName+'的時段？';
  const filled=getFilledMembers(gi);_isFirstClearer=filled.length===0;
  const note=_isFirstClearer?'目前尚無人填寫，按「是」將清除所有人時段。':'目前已有 '+filled.length+' 人填寫。\n按「是」將清除尚未填寫成員的時段。';
  d.textContent='你是本次開啟後第一次修改時段。\n是否要清除「'+groupName+'」成員的時段？\n\n'+note+'\n＊第一位填寫請選「是」清除所有人\n點「否」只會修改你自己選的那格。';
  document.getElementById('clearNoBtn').onclick=()=>{closeClearModal();if(_pendingUnlock){activateCell(_pendingUnlock.gi,_pendingUnlock.mi,_pendingUnlock.di);_pendingUnlock=null;}if(_pendingCycle){doCycleType(_pendingCycle.gi,_pendingCycle.mi,_pendingCycle.di);_pendingCycle=null;}};
  document.getElementById('clearYesBtn').onclick=()=>{closeClearModal();clearTeamTimes(gi);};
  document.getElementById('clearModal').style.display='block';
}
function closeClearModal(){document.getElementById('clearModal').style.display='none';}
function clearTeamTimes(gi){
  const filled=new Set(getFilledMembers(gi).map(m=>m.name));
  groups[gi].members.forEach(m=>{
    if(!_isFirstClearer&&filled.has(m.name)) return;
    if(currentWeekView==='next'){if(!m.nextWeek)m.nextWeek={days:Array(7).fill('empty'),times:Array(7).fill('—')};m.nextWeek.days=Array(7).fill('empty');m.nextWeek.times=Array(7).fill('—');}
    else{m.days=Array(7).fill('empty');m.times=Array(7).fill('—');}
  });
  markClearUsed();
  buildTable();
  if(_pendingUnlock){activateCell(_pendingUnlock.gi,_pendingUnlock.mi,_pendingUnlock.di);_pendingUnlock=null;}
  if(_pendingCycle){doCycleType(_pendingCycle.gi,_pendingCycle.mi,_pendingCycle.di);_pendingCycle=null;}
  saveData();showToast('✅ 已清除'+groups[gi].name+'時段！');
}

// ── CRUD ──────────────────────────────────────────────────────────────────────
function delRow(gi,mi){
  const last=groups.length-1;
  if(gi!==last){groups[last].members.push(groups[gi].members.splice(mi,1)[0]);buildTable();return;}
  if(!confirm('永久刪除「'+groups[gi].members[mi].name+'」？')) return;
  groups[gi].members.splice(mi,1);buildTable();
}
function addMemberToGroup(gi){groups[gi].members.push({name:'新成員',lv:'',job:'職業',days:Array(7).fill('empty'),times:Array(7).fill('—'),note:''});buildTable();}

// ── Drag ──────────────────────────────────────────────────────────────────────
let _drag=null;
function onDragStart(e,gi,mi){_drag={gi,mi};e.dataTransfer.effectAllowed='move';setTimeout(()=>e.target.closest('tr').classList.add('dragging'),0);}
function onDragOver(e){e.preventDefault();const tr=e.target.closest('tr.member');if(!tr)return;document.querySelectorAll('tr.drag-over').forEach(r=>r.classList.remove('drag-over'));tr.classList.add('drag-over');}
function onDrop(e,gi,mi){e.preventDefault();if(!_drag)return;const[mv]=groups[_drag.gi].members.splice(_drag.mi,1);groups[gi].members.splice(mi,0,mv);_drag=null;buildTable();}
function onDropGroup(e,gi){e.preventDefault();document.querySelectorAll('tr.drag-over').forEach(r=>r.classList.remove('drag-over'));if(!_drag)return;const[mv]=groups[_drag.gi].members.splice(_drag.mi,1);groups[gi].members.push(mv);_drag=null;buildTable();}

// ── Save/Load ─────────────────────────────────────────────────────────────────
function onRaidTimeChange(){clearTimeout(onRaidTimeChange._t);onRaidTimeChange._t=setTimeout(saveData,1500);}
async function saveData(){
  showToast('???...','#8bb8f0');
  _localVersion=Date.now();
  const slim=groups.filter(g=>g&&g.name).map(g=>({name:g.name,colorIdx:g.colorIdx,raidTime:g.raidTime||'',members:(g.members||[]).filter(m=>m&&m.name).map(m=>({name:m.name,lv:m.lv||'',job:m.job||'',days:Array.isArray(m.days)?m.days:Array(7).fill('empty'),times:Array.isArray(m.times)?m.times:Array(7).fill('?'),note:m.note||'',nextWeek:(m.nextWeek&&typeof m.nextWeek==='object')?m.nextWeek:null}))}));
  const payload={groups:slim,_v:_localVersion};
  try{localStorage.setItem('raidSchedule_google_v2',JSON.stringify(payload));}catch(e){}
  try{
    const r=await fetch(APPS_SCRIPT_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action:'saveSchedule',data:payload})});
    const out=await r.json();
    if(!out.ok) throw new Error(out.error||'save failed');
    showToast('???????? Google ???');
    showSyncStatus('ok');
  }catch(e){
    showToast('??????Google ?????'+e.message,'#e8c56a');
    showSyncStatus('error');
  }
}
function isValidRemoteData(d){
  if(!d||!d.groups||!Array.isArray(d.groups)||!d.groups.length) return false;
  return d.groups.reduce((n,g)=>n+(g.members||[]).filter(m=>m&&m.name).length,0)>=5;
}

function normalizeRemoteData(d){
  if(!d || !Array.isArray(d.groups)) return d;
  d.groups.forEach(g=>{
    if(!Array.isArray(g.members)) g.members=[];
    g.members=g.members.filter(m=>m&&m.name);
    g.members.forEach(m=>{
      if(!Array.isArray(m.days)) m.days=String(m.days||'').trim().split(/\s+/).filter(Boolean);
      if(!Array.isArray(m.times)) m.times=String(m.times||'').trim().split(/\s+/).filter(Boolean);
      while(m.days.length<7) m.days.push('empty');
      while(m.times.length<7) m.times.push('?');
      m.days=m.days.slice(0,7);
      m.times=m.times.slice(0,7);
      if(!m.nextWeek || typeof m.nextWeek==='string') m.nextWeek=null;
      if(m.nextWeek){
        if(!Array.isArray(m.nextWeek.days)) m.nextWeek.days=String(m.nextWeek.days||'').trim().split(/\s+/).filter(Boolean);
        if(!Array.isArray(m.nextWeek.times)) m.nextWeek.times=String(m.nextWeek.times||'').trim().split(/\s+/).filter(Boolean);
        while(m.nextWeek.days.length<7) m.nextWeek.days.push('empty');
        while(m.nextWeek.times.length<7) m.nextWeek.times.push('?');
        m.nextWeek.days=m.nextWeek.days.slice(0,7);
        m.nextWeek.times=m.nextWeek.times.slice(0,7);
      }
    });
  });
  return d;
}
function mergeRemoteData(rg){
  groups=JSON.parse(JSON.stringify(DEFAULT_GROUPS));
  rg.forEach(r=>{
    const li=groups.findIndex(g=>g.name===r.name);
    if(li>=0){
      if(r.raidTime!==undefined) groups[li].raidTime=r.raidTime;
      (r.members||[]).filter(rm=>rm&&rm.name).forEach(rm=>{
        const mi=groups[li].members.findIndex(m=>m&&m.name===rm.name);
        if(mi>=0){if(rm.lv!==undefined)groups[li].members[mi].lv=rm.lv;if(rm.job!==undefined)groups[li].members[mi].job=rm.job;if(rm.days&&rm.days.length===7)groups[li].members[mi].days=rm.days;if(rm.times&&rm.times.length===7)groups[li].members[mi].times=rm.times;if(rm.note!==undefined)groups[li].members[mi].note=rm.note;if(rm.nextWeek&&typeof rm.nextWeek==='object')groups[li].members[mi].nextWeek=rm.nextWeek;}
        else groups[li].members.push(rm);
      });
    } else if(r.name&&r.name!=='散人') groups.push(r);
  });
}
async function loadData(){
  showSyncStatus('loading');
  let loaded=false;
  try{
    const r=await fetch(APPS_SCRIPT_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action:'loadSchedule'})});
    const out=await r.json();
    if(out.ok && out.data && isValidRemoteData(normalizeRemoteData(out.data))){
      mergeRemoteData(normalizeRemoteData(out.data).groups);
      _localVersion=out.data._v||0;
      loaded=true;
      showSyncStatus('ok');
    }
  }catch(e){console.warn('google load failed:',e.message);}
  if(!loaded){
    try{
      const s=localStorage.getItem('raidSchedule_google_v2');
      if(s){const d=normalizeRemoteData(JSON.parse(s));if(isValidRemoteData(d)){mergeRemoteData(d.groups);_localVersion=d._v||0;loaded=true;}}
    }catch(e){}
  }
  if(!loaded){
    groups=JSON.parse(JSON.stringify(DEFAULT_GROUPS));
    showSyncStatus('error');
    setTimeout(saveData,1000);
  }
  updateDateHeader();updateWeekTabs();buildTable();
  setTimeout(autoRefresh,300000);
}
async function autoRefresh(){
  if(appMode!=='view'){setTimeout(autoRefresh,300000);return;}
  try{
    const r=await fetch(APPS_SCRIPT_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action:'loadSchedule'})});
    const out=await r.json();
    if(out.ok && out.data && isValidRemoteData(normalizeRemoteData(out.data)) && (out.data._v||0)>=_localVersion){
      mergeRemoteData(normalizeRemoteData(out.data).groups);
      buildTable();
    }
    showSyncStatus('ok');
  }catch(e){showSyncStatus('error');}
  setTimeout(autoRefresh,300000);
}
function showSyncStatus(s){const el=document.getElementById('syncStatus');if(!el)return;const m={loading:['⟳ 讀取中…','#5a6180'],ok:['● 已同步','#5de0a5'],error:['● 離線','#f08080']};const[txt,color]=m[s]||m.ok;el.textContent=txt;el.style.color=color;}
function showToast(msg,color){let t=document.getElementById('toast');if(!t){t=document.createElement('div');t.id='toast';t.style.cssText='position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(120px);background:#181c27;border-radius:10px;padding:12px 24px;font-size:.82rem;font-family:inherit;white-space:nowrap;box-shadow:0 6px 24px rgba(0,0,0,.5);transition:transform .3s;z-index:2000;text-align:center;';document.body.appendChild(t);}t.textContent=msg;t.style.color=color||'#7ed87e';t.style.border='1px solid '+(color||'#2d5a2d');t.style.transform='translateX(-50%) translateY(0)';clearTimeout(t._t);t._t=setTimeout(()=>{t.style.transform='translateX(-50%) translateY(120px)';},2500);}

// ── Schedule refresh ──────────────────────────────────────────────────────────
function scheduleWeekRefresh(){
  const now=new Date(),next=new Date(now);
  next.setHours(23,0,1,0);
  while(next<=now||next.getDay()!==3){next.setDate(next.getDate()+1);next.setHours(23,0,1,0);}
  setTimeout(()=>{groups.forEach(g=>g.members.forEach(m=>{m.days=Array(7).fill('empty');m.times=Array(7).fill('—');}));updateDateHeader();buildTable();saveData();showToast('🗓️ 週三自動清除完成！');scheduleWeekRefresh();},next-now);
}

// ── Signup ────────────────────────────────────────────────────────────────────
function populateJobDropdown(){
  const sel=document.getElementById('su-job');
  if(!sel||sel.options.length>1) return;
  JOB_LIST.forEach(g=>{
    const og=document.createElement('optgroup');
    og.label=g.sys;
    g.jobs.forEach(j=>{const o=document.createElement('option');o.value=j;o.textContent=j;og.appendChild(o);});
    sel.appendChild(og);
  });
}
function showSignupModal(){
  populateJobDropdown();
  const c=document.getElementById('su-days');c.innerHTML='';
  DAYS_LABEL.forEach((label,di)=>{const p=label.split(' ');const w=document.createElement('div');w.innerHTML='<button class="su-day-btn" id="su-btn-'+di+'" onclick="toggleSuDay('+di+')">'+p[0]+' '+p[1]+'</button><input class="su-day-input" id="su-time-'+di+'" placeholder="e.g. 19:00後 或 整天">';c.appendChild(w);});
  document.getElementById('su-name').value='';document.getElementById('su-lv').value='';document.getElementById('su-job').value='';document.getElementById('su-err').style.display='none';
  document.getElementById('signupModal').style.display='flex';setTimeout(()=>document.getElementById('su-name').focus(),50);
}
function toggleSuDay(di){const b=document.getElementById('su-btn-'+di),i=document.getElementById('su-time-'+di);b.classList.toggle('active');i.style.display=b.classList.contains('active')?'block':'none';if(!b.classList.contains('active'))i.value='';}
function closeSignupModal(){document.getElementById('signupModal').style.display='none';}
function submitSignup(){
  const name=document.getElementById('su-name').value.trim(),lv=document.getElementById('su-lv').value.trim(),job=document.getElementById('su-job').value.trim(),err=document.getElementById('su-err');
  if(!name){err.textContent='請填寫遊戲名稱';err.style.display='block';return;}
  if(!job){err.textContent='請填寫職業';err.style.display='block';return;}
  const days=Array(7).fill('empty'),times=Array(7).fill('—');let hasDay=false;
  DAYS_LABEL.forEach((_,di)=>{const b=document.getElementById('su-btn-'+di),i=document.getElementById('su-time-'+di);if(b&&b.classList.contains('active')){hasDay=true;const v=i?normalizeTime(i.value.trim())||'整天':'整天';times[di]=v;days[di]=v==='✗'?'no':v==='整天'?'all-day':'partial';}});
  if(!hasDay){err.textContent='請至少選擇一個日期';err.style.display='block';return;}
  groups[groups.length-1].members.push({name,lv,job,days,times,note:''});
  closeSignupModal();saveData();buildTable();showToast('✅ 已報名完成！請等待編組');
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ── Start ─────────────────────────────────────────────────────────────────────
DAYS_LABEL=computeWeekDays();
updateDateHeader();
updateWeekTabs();
buildTable();
loadData();
scheduleWeekRefresh();
</script>
